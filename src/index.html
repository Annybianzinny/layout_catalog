<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Catalog</title>

    <link
      rel="stylesheet"
      href="./styles/index.scss"
    />
  </head>

  <body>
    <header class="header">
      <nav class="nav">
        <ul class="nav__list">
          <li class="nav__item">
            <a
              href="#"
              class="nav__link is-active"
            >
              Apple
            </a>
          </li>

          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
            >
              Samsung
            </a>
          </li>

          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
            >
              Smartphones
            </a>
          </li>

          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
              data-qa="nav-hover"
            >
              Laptops & computers
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="catalog">
      <article
        class="card"
        data-qa="card"
      >
        <img
          class="card__image"
          src="./images/imac.jpeg"
          alt="APPLE A1419 iMac 27 Retina 5K Monoblock"
        />

        <h2 class="card__title">
          APPLE A1419 iMac 27" Retina 5K Monoblock (MNED2UA/A)
        </h2>

        <div class="card__code">Product code: 195434</div>

        <div class="card__rating">
          <div class="stars">
            <img
              class="stars__star"
              src="./images/star-active.svg"
              alt="star"
            />

            <img
              class="stars__star"
              src="./images/star-active.svg"
              alt="star"
            />

            <img
              class="stars__star"
              src="./images/star-active.svg"
              alt="star"
            />

            <img
              class="stars__star"
              src="./images/star-active.svg"
              alt="star"
            />

            <img
              class="stars__star"
              src="./images/star.svg"
              alt="star"
            />
          </div>

          <div class="card__reviews">Reviews: 5</div>
        </div>

        <div class="card__price-row">
          <div class="card__price-label">Price:</div>

          <div class="card__price">$2,199</div>
        </div>

        <a
          href="#"
          class="card__button"
          data-qa="card-hover"
        >
          BUY
        </a>
      </article>
    </main>
  </body>
</html>
