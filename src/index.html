<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Catalog</title>

    <link
      rel="stylesheet"
      href="./styles/index.scss"
    />
  </head>

  <body>
    <header class="header">
      <nav class="nav">
        <ul class="nav__list">
          <li class="nav__item">
            <a
              class="nav__link is-active"
              href="#"
            >
              Apple
            </a>
          </li>
          <li class="nav__item">
            <a
              class="nav__link"
              href="#"
            >
              Samsung
            </a>
          </li>
          <li class="nav__item">
            <a
              class="nav__link"
              href="#"
            >
              Smartphones
            </a>
          </li>
          <li class="nav__item">
            <a
              class="nav__link"
              href="#"
              data-qa="nav-hover"
            >
              Laptops & computers
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main">
      <section class="catalog">
        <div class="catalog__grid">
          <div
            class="card"
            data-qa="card"
          >
            <img
              class="card__image"
              src="./images/imac.jpeg"
              alt="iMac"
            />

            <h2 class="card__title">Apple iMac 27"</h2>

            <div class="card__stars">
              <img
                src="./images/star-active.svg"
                alt="star"
              />
              <img
                src="./images/star-active.svg"
                alt="star"
              />
              <img
                src="./images/star-active.svg"
                alt="star"
              />
              <img
                src="./images/star-active.svg"
                alt="star"
              />
              <img
                src="./images/star.svg"
                alt="star"
              />
            </div>

            <div class="card__price">$1,999</div>

            <a
              href="#"
              class="card__button"
              data-qa="card-hover"
            >
              Buy
            </a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
