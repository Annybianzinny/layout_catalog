<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Catalog</title>

    <link
      rel="stylesheet"
      href="./styles/index.scss"
    />
  </head>

  <body>
    <header class="header">
      <nav class="nav">
        <ul class="nav__list">
          <li class="nav__item">
            <a
              href="#"
              class="nav__link is-active"
            >
              Apple
            </a>
          </li>

          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
            >
              Samsung
            </a>
          </li>

          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
            >
              Smartphones
            </a>
          </li>

          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
              data-qa="nav-hover"
            >
              Laptops & computers
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="catalog">
      <article
        class="card"
        data-qa="card"
      >
        <img
          class="card__image"
          src="./images/imac.jpeg"
          alt="Apple iMac 27"
        />

        <h2 class="card__title">Apple iMac 27"</h2>

        <div class="stars">
          <img
            class="stars__star"
            src="./images/star-active.svg"
            alt="star"
          />
          <img
            class="stars__star"
            src="./images/star-active.svg"
            alt="star"
          />
          <img
            class="stars__star"
            src="./images/star-active.svg"
            alt="star"
          />
          <img
            class="stars__star"
            src="./images/star-active.svg"
            alt="star"
          />
          <img
            class="stars__star"
            src="./images/star.svg"
            alt="star"
          />
        </div>

        <div class="card__price">$1,999</div>

        <a
          href="#"
          class="card__button"
          data-qa="card-hover"
        >
          Buy
        </a>
      </article>
    </main>
  </body>
</html>
